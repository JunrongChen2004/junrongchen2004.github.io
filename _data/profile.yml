short_bio: >-
  <p>
    I am an incoming PhD student at UC Irvine, where I am honored to be advised by <a href="https://jhoffman.github.io/" target="_blank">Prof. Judy Hoffman</a>.
    Previously, I obtained my bachelor's degree at UC San Diego (B.S. '26) double-majoring in Mathematics–Computer Science
    and Cognitive Science with Specialization in Machine Learning and Neural Computation, where I worked with <a href="https://zhiting.ucsd.edu/" target="_blank">Prof. Zhiting Hu</a>,
     <a href="https://creel-lab.ucsd.edu/" target="_blank">Prof. Sarah Creel</a>, and <a href="https://www.cs.cornell.edu/~jjsun/" target="_blank">Prof. Jennifer J. Sun</a>.  
  </p>
  <p>
    My research interests include world models, embodied AI, and AI agents, with a broader focus on high-level capabilities of AI.
  </p>

